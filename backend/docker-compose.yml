version: '3.8'

services:

  # ── NGINX (API Gateway) ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: fintech-nginx

    ports:
    
      - "80:80"

    volumes:
     
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      # ":ro" = read-only.

    depends_on:
     
      - app

    networks:
      - fintech-network

    restart: unless-stopped
    # restart policy:
    #   "no"             = never restart
    #   "always"         = always restart
    #   "unless-stopped" = restart unless manually stopped
    #   "on-failure"     = only restart on error exit codes


  app:
    
    build:
      context: .
      dockerfile: Dockerfile

    container_name: fintech-app

    dns:
      - 8.8.8.8
      - 1.1.1.1

    command: >
      sh -c "npx prisma db push --accept-data-loss && node src/server.js"

    
    expose:
      - "5555"

    environment:

      NODE_ENV:               production
      PORT:                   5555
      DATABASE_URL:           postgresql://postgres:admin@postgres:5432/fintech_db
      TEST_DATABASE_URL:      postgresql://postgres:admin@postgres:5432/fintech_test_db
      JWT_ACCESS_SECRET:      ${JWT_ACCESS_SECRET}
      JWT_ACCESS_EXPIRES_IN:  ${JWT_ACCESS_EXPIRES_IN}
      JWT_REFRESH_SECRET:     ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
      BCRYPT_ROUNDS:          ${BCRYPT_ROUNDS}
      SESSION_SECRET:         ${SESSION_SECRET}
      REDIS_HOST:             redis
      REDIS_PORT:             6379
      EMAIL_HOST:             ${EMAIL_HOST}
      EMAIL_PORT:             ${EMAIL_PORT}
      EMAIL_USER:             ${EMAIL_USER}
      EMAIL_PASS:             ${EMAIL_PASS}
      EMAIL_FROM:             ${EMAIL_FROM}

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    networks:
      - fintech-network

    restart: unless-stopped

 
  postgres:
    image: postgres:15-alpine
    container_name: fintech-postgres

    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB:       fintech_db

    volumes:

      - postgres_data:/var/lib/postgresql/data

    ports:
     
      - "5434:5432"
      

    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout:  5s
      retries:  5

    networks:
      - fintech-network

    restart: unless-stopped

  # ── REDIS ──────────────────────────────────────────────────
  redis:
    image: redis:alpine
    container_name: fintech-redis-compose

    ports:
      - "6380:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5

    networks:
      - fintech-network

    restart: unless-stopped

# ── NETWORKS ─────────────────────────────────────────────────

networks:
  fintech-network:
    driver: bridge

# ── VOLUMES ──────────────────────────────────────────────────

volumes:
  postgres_data:
  redis_data: