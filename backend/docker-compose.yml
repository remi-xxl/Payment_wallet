version: '3.8'

services:

  # ── FRONTEND (React SPA + API Gateway) ─────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile

    container_name: fintech-frontend

    ports:
      - "80:80"

    depends_on:
      - app

    networks:
      - fintech-network

    restart: unless-stopped


  app:
    
    build:
      context: .
      dockerfile: Dockerfile

    container_name: fintech-app

    dns:
      - 8.8.8.8
      - 1.1.1.1

    command: >
      sh -c "npx prisma db push --accept-data-loss && node src/server.js"

    
    expose:
      - "5555"

    environment:

      NODE_ENV:               production
      PORT:                   5555
      DATABASE_URL:           postgresql://postgres:admin@postgres:5432/fintech_db
      TEST_DATABASE_URL:      postgresql://postgres:admin@postgres:5432/fintech_test_db
      JWT_ACCESS_SECRET:      ${JWT_ACCESS_SECRET}
      JWT_ACCESS_EXPIRES_IN:  ${JWT_ACCESS_EXPIRES_IN}
      JWT_REFRESH_SECRET:     ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
      BCRYPT_ROUNDS:          ${BCRYPT_ROUNDS}
      SESSION_SECRET:         ${SESSION_SECRET}
      REDIS_HOST:             redis
      REDIS_PORT:             6379
      EMAIL_HOST:             ${EMAIL_HOST}
      EMAIL_PORT:             ${EMAIL_PORT}
      EMAIL_USER:             ${EMAIL_USER}
      EMAIL_PASS:             ${EMAIL_PASS}
      EMAIL_FROM:             ${EMAIL_FROM}

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    networks:
      - fintech-network

    restart: unless-stopped

 
  postgres:
    image: postgres:15-alpine
    command:
     - "postgres"

     - "-c"
     - "log_min_duration_statement=100"

     - "-c"
     - "log_connections=on"

     - "-c"
     - "log_disconnections=on"

     - "-c"
     - "log_autovacuum_min_duration=0"

    
    container_name: fintech-postgres

    environment:
      POSTGRES_USER:     fintech_app
      POSTGRES_PASSWORD: aderemi325
      POSTGRES_DB:       fintech_db

    volumes:

      - postgres_data:/var/lib/postgresql/data

    ports:
     
      - "5434:5432"
      

    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout:  5s
      retries:  5

    networks:
      - fintech-network

    restart: unless-stopped

  # ── REDIS ──────────────────────────────────────────────────
  redis:
    image: redis:alpine
    container_name: fintech-redis-compose

    ports:
      - "6380:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5

    networks:
      - fintech-network

    restart: unless-stopped

# ── PGBOUNCER (Connection Pooler) ──────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer
    container_name: fintech-pgbouncer

    environment:
      DATABASE_URL:  postgresql://postgres:admin@postgres:5432/fintech_db
      AUTH_TYPE:     scram-sha-256
      POOL_MODE:     transaction
      # transaction mode = connection returned to pool after each transaction
      # This is ideal for web APIs

      MAX_CLIENT_CONN: 100
      # Max connections from your app to PgBouncer

      DEFAULT_POOL_SIZE: 20
      # PgBouncer maintains only 20 real connections to PostgreSQL
    

    ports:
      - "5433:5432"
    

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - fintech-network

# ── PROMETHEUS ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: fintech-prometheus

    ports:
      - "9090:9090"

    volumes:
      # Mount our Prometheus config
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # Persist metrics data
      - prometheus_data:/prometheus

    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      # Keep 30 days of metrics data
      - '--storage.tsdb.retention.time=30d'

    networks:
      - fintech-network

    restart: unless-stopped

  # ── GRAFANA ────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: fintech-grafana

    ports:
      - "3001:3000"
      # Grafana UI at localhost:3001

    environment:
      # Default admin credentials — change in production
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: admin

    volumes:
      - grafana_data:/var/lib/grafana
      # Pre-configure Grafana data sources
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources:ro

    depends_on:
      - prometheus

    networks:
      - fintech-network

    restart: unless-stopped
# ── NETWORKS ─────────────────────────────────────────────────

networks:
  fintech-network:
    driver: bridge

# ── VOLUMES ──────────────────────────────────────────────────

volumes:
  postgres_data:
  redis_data:
  prometheus_data:   
  grafana_data:      