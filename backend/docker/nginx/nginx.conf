
# "user nginx" means NGINX worker processes run as the "nginx" user
# not as root. Running as root is a security risk —
user nginx;

# worker_processes auto = NGINX automatically sets the number of
# worker processes to match the number of CPU cores on the machine.
# More cores = more workers = handles more simultaneous connections.
worker_processes auto;

# Where NGINX writes its error log and what level of detail to log.
# Levels: debug, info, notice, warn, error, crit
# "warn" means only log warnings and above — not too noisy.
error_log /var/log/nginx/error.log warn;

# Where NGINX stores its process ID.
# Used by the OS to send signals to NGINX (restart, reload etc.)
pid /var/run/nginx.pid;

# ─── EVENTS BLOCK ────────────────────────────────────────────
# Controls how NGINX handles connections at the network level
events {
  # How many simultaneous connections ONE worker can handle.
  # Total connections = worker_processes × worker_connections
  # e.g. 4 CPUs × 1024 = 4096 simultaneous connections
  worker_connections 1024;

  # "epoll" is the most efficient connection method on Linux.
  # It only wakes up when there is actual activity on a connection
  # instead of constantly checking all connections.
  use epoll;

  # Allow a worker to accept multiple connections at once
  # instead of one at a time. Improves performance under load.
  multi_accept on;
}

# ─── HTTP BLOCK ───────────────────────────────────────────────
# All HTTP/HTTPS configuration lives inside this block
http {

  # Include the standard MIME types file.
  # MIME types tell the browser what kind of file is being sent.
  # e.g. .json → application/json, .html → text/html
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  # ── LOGGING FORMAT ─────────────────────────────────────────
  # Define a custom log format called "main".
  # This is what gets written to the access log for every request.
  # Variables starting with $ are NGINX built-in variables.
  log_format main
    '$remote_addr - $remote_user [$time_local] '
    '"$request" $status $body_bytes_sent '
    '"$http_referer" "$http_user_agent" '
    'rt=$request_time';
  #  ↑ request_time = how long the request took in seconds
  #    This is critical for performance monitoring

  # Where to write access logs using our "main" format
  access_log /var/log/nginx/access.log main;

  # ── PERFORMANCE ────────────────────────────────────────────
  # sendfile = use the OS kernel to send files directly
  # instead of copying data through NGINX.
  # Much faster for serving static files.
  sendfile on;

  # tcp_nopush = batch small packets together before sending.
  # Reduces the number of network packets sent.
  tcp_nopush on;

  # tcp_nodelay = send data immediately without waiting to batch.
  # Works opposite to tcp_nopush but they complement each other
  # when used together with sendfile.
  tcp_nodelay on;

  # How long to keep an idle connection open.
  # Reusing connections is faster than opening new ones for every request.
  # 65 seconds is a common production value.
  keepalive_timeout 65;

  # ── SECURITY ───────────────────────────────────────────────
  # Hide the NGINX version number from error pages and headers.
  # Attackers look for specific version numbers to find known vulnerabilities.
  # "Server: nginx" is fine. "Server: nginx/1.24.0" gives them a target.
  server_tokens off;

  # ── GZIP COMPRESSION ───────────────────────────────────────
  # Compress responses before sending them.
  # A 100KB JSON response might compress to 20KB.
  # Less data = faster transfer = happier users.
  gzip on;

  # Minimum response size to compress.
  # Compressing tiny responses wastes CPU — not worth it.
  gzip_min_length 1024;

  # Which response types to compress.
  # We compress JSON (our API responses) and text.
  gzip_types
    application/json
    application/javascript
    text/plain
    text/css
    text/xml;

  # Compression level 6 = good balance of speed vs compression ratio.
  # Level 1 = fastest, least compression.
  # Level 9 = slowest, most compression.
  gzip_comp_level 6;

  # ── RATE LIMITING ──────────────────────────────────────────
  # Define rate limiting zones.
  # These work at the NETWORK level — before requests even reach Express.
  # Even if someone bypasses Express rate limiting, NGINX stops them here.

  # General API rate limit: 30 requests per minute per IP
  # "zone=api:10m" = store rate limit data in 10MB of shared memory
  # named "api". 10MB can track ~160,000 IP addresses.
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

  # Stricter limit for auth endpoints: 10 requests per minute per IP
  limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

  # ── CLIENT LIMITS ──────────────────────────────────────────
  # Maximum size of a request body.
  # Prevents attackers from sending huge payloads to crash your server.
  # 10MB is generous for a fintech API — most requests are tiny JSON.
  client_max_body_size 10M;

  # How long to wait for the client to send the request body.
  client_body_timeout 12s;

  # How long to wait for the client to send request headers.
  client_header_timeout 12s;

  # How long to wait between sending response packets to the client.
  send_timeout 10s;

  # Include all config files in the conf.d directory.
  # Our API-specific config lives there.
  include /etc/nginx/conf.d/*.conf;
}