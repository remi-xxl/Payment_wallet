# docker/nginx/conf.d/api.conf

# ─── UPSTREAM ─────────────────────────────────────────────────
# "upstream" defines a GROUP of backend servers.
# NGINX load balances between them automatically.
# Right now we only have one Express server.
# In production you might have multiple instances:
#   server app:3000;
#   server app:3001;
#   server app:3002;
# NGINX would distribute traffic between all three.
upstream express_app {
  # "app" is the Docker service name of our Express container.
  # Docker's internal DNS resolves "app" to the container's IP.
  # Port 5555 is where Express listens.
  server app:5555;

  # keepalive = maintain persistent connections to the upstream server.
  # Reusing connections is much faster than opening new ones for every request.
  keepalive 32;
}

# ─── SERVER BLOCK ─────────────────────────────────────────────
# A server block = a virtual server configuration.
# You can have multiple server blocks for different domains.
server {

  # Listen on port 80 (standard HTTP port).
  # Clients connect to port 80 — not port 3000.
  # Port 3000 is hidden inside the Docker network.
  listen 80;

  # The domain name this server responds to.
  # "_" means respond to ANY domain or IP address.
  # In production: server_name api.yourapp.com;
  server_name _;

  # ── SECURITY HEADERS ───────────────────────────────────────
  # These headers are added to EVERY response from this server.
  # They protect against common web attacks.

  # Prevents browsers from guessing the content type.
  # If NGINX says it is JSON, the browser treats it as JSON — always.
  add_header X-Content-Type-Options  "nosniff"         always;

  # Prevents this page from being embedded in iframes on other sites.
  # Protects against clickjacking attacks.
  add_header X-Frame-Options         "DENY"            always;

  # Enables browser's built-in XSS filter.
  add_header X-XSS-Protection        "1; mode=block"   always;

  # Controls how much referrer information is included with requests.
  # "no-referrer-when-downgrade" = don't send referrer from HTTPS to HTTP.
  add_header Referrer-Policy         "no-referrer-when-downgrade" always;

  # Tells browsers to only connect via HTTPS for the next year.
  # Only add this in production when you have SSL set up.
  # add_header Strict-Transport-Security "max-age=31536000" always;

  # ── HEALTH CHECK ENDPOINT ──────────────────────────────────
  # A simple endpoint NGINX handles itself — no need to hit Express.
  # Used by load balancers and monitoring tools to check if NGINX is up.
  location /nginx-health {
    # return directly from NGINX without proxying to Express
    return 200 '{"status":"NGINX is healthy"}';
    add_header Content-Type application/json;
  }

  # ── AUTH ROUTES (strict rate limiting) ────────────────────
  location /api/v1/auth/ {

    # Apply the strict auth rate limit zone.
    # burst=5 = allow up to 5 requests to queue up before rejecting.
    # nodelay = process queued requests immediately, do not add delay.
    limit_req zone=auth burst=5 nodelay;

    # 429 = Too Many Requests — the correct HTTP status for rate limiting
    limit_req_status 429;

    # Proxy the request to our Express app
    proxy_pass http://express_app;

    # Tell Express the real client IP address.
    # Without this, Express sees NGINX's IP for every request.
    # With this, Express sees the actual client IP.
    proxy_set_header X-Real-IP        $remote_addr;
    proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;

    # Tell Express the original protocol (http or https).
    # When you add SSL later, Express needs to know the original was HTTPS.
    proxy_set_header X-Forwarded-Proto $scheme;

    # Pass the original Host header to Express.
    proxy_set_header Host              $host;

    # Timeouts for the connection to Express.
    # If Express takes longer than this — return a 504 Gateway Timeout.
    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;
  }

  # ── ALL OTHER API ROUTES (general rate limiting) ──────────
  location /api/ {

    # Apply general rate limit
    limit_req zone=api burst=10 nodelay;
    limit_req_status 429;

    proxy_pass http://express_app;

    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Host              $host;

    # Disable buffering for API responses.
    # Buffering = NGINX waits for the full response from Express
    # before sending to client.
    # For APIs we want to stream responses immediately.
    proxy_buffering off;

    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;
  }

  # ── 404 FOR EVERYTHING ELSE ───────────────────────────────
  # Any request that does not match the above locations
  # gets a 404. This blocks random scanning for vulnerabilities.
  location / {
    return 404 '{"success":false,"message":"Not found"}';
    add_header Content-Type application/json;
  }

  # ── ERROR PAGES ───────────────────────────────────────────
  # Custom error responses in JSON format.
  # Our API clients expect JSON — not NGINX's default HTML error pages.

  # 429 Too Many Requests
  error_page 429 = @too_many_requests;
  location @too_many_requests {
    add_header Content-Type application/json always;
    return 429 '{"success":false,"message":"Too many requests. Please slow down."}';
  }

  # 502 Bad Gateway (Express is down)
  error_page 502 = @bad_gateway;
  location @bad_gateway {
    add_header Content-Type application/json always;
    return 502 '{"success":false,"message":"Service temporarily unavailable"}';
  }

  # 504 Gateway Timeout (Express took too long)
  error_page 504 = @gateway_timeout;
  location @gateway_timeout {
    add_header Content-Type application/json always;
    return 504 '{"success":false,"message":"Request timeout. Please try again."}';
  }

  # Health check endpoints — no rate limiting
  # Monitoring tools ping these frequently
  location /health/ {
    proxy_pass http://express_app;
    proxy_set_header X-Real-IP        $remote_addr;
    proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
    proxy_set_header Host             $host;

    # Faster timeouts for health checks
    proxy_connect_timeout 5s;
    proxy_read_timeout    5s;
  }
}