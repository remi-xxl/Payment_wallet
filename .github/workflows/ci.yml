
name: CI Pipeline

# Runs on every push and pull request to staging and main
on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

defaults:
  run:
    working-directory: backend

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: admin
          POSTGRES_DB:       fintech_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create test database
        run: psql -h localhost -U postgres -c "CREATE DATABASE fintech_test_db;"
        env:
          PGPASSWORD: admin

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:admin@localhost:5432/fintech_db

      - name: Push schema to main database
        run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: postgresql://postgres:admin@localhost:5432/fintech_db

      - name: Push schema to test database
        run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: postgresql://postgres:admin@localhost:5432/fintech_test_db

      - name: Run tests
        run: npm test
        env:
          DATABASE_URL:           postgresql://postgres:admin@localhost:5432/fintech_db
          TEST_DATABASE_URL:      postgresql://postgres:admin@localhost:5432/fintech_test_db
          JWT_ACCESS_SECRET:      ci_access_secret_not_real
          JWT_ACCESS_EXPIRES_IN:  15m
          JWT_REFRESH_SECRET:     ci_refresh_secret_not_real
          JWT_REFRESH_EXPIRES_IN: 7d
          BCRYPT_ROUNDS:          1
          SESSION_SECRET:         ci_session_secret_not_real
          REDIS_HOST:             localhost
          REDIS_PORT:             6379
          EMAIL_HOST:             smtp.ethereal.email
          EMAIL_PORT:             587
          EMAIL_USER:             test@ethereal.email
          EMAIL_PASS:             testpassword
          EMAIL_FROM:             noreply@fintechapi.com
          NODE_ENV:               test
          PORT:                   5555